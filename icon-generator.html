<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<title>Kenmovies Icon Generator</title>
<style>
  body{background:#0a0a0f;color:#f0f0f8;font-family:sans-serif;display:flex;flex-direction:column;align-items:center;padding:30px;gap:20px}
  h1{color:#00e5c3;letter-spacing:0.1em;font-size:24px;margin:0}
  p{color:#6b7280;font-size:13px;margin:0;text-align:center}
  .row{display:flex;gap:30px;flex-wrap:wrap;justify-content:center}
  .card{background:#111118;border:1px solid rgba(255,255,255,0.1);border-radius:12px;padding:20px;display:flex;flex-direction:column;align-items:center;gap:12px}
  .card span{font-size:12px;color:#6b7280}
  button{padding:10px 24px;border-radius:99px;background:#00e5c3;color:#000;font-weight:700;font-size:13px;border:none;cursor:pointer;transition:background 0.2s}
  button:hover{background:#00f5d4}
  canvas{border-radius:12px}
</style>
</head>
<body>
<h1>KENMOVIES ICON GENERATOR</h1>
<p>Click the download buttons to save your icons, then upload them to GitHub.</p>

<div class="row">
  <div class="card">
    <canvas id="c512" width="512" height="512"></canvas>
    <span>512 × 512</span>
    <button onclick="download('c512','android-chrome-512x512.png')">Download 512×512</button>
  </div>
  <div class="card">
    <canvas id="c192" width="192" height="192"></canvas>
    <span>192 × 192</span>
    <button onclick="download('c192','android-chrome-192x192.png')">Download 192×192</button>
  </div>
</div>

<script>
function drawIcon(canvasId, size) {
  const canvas = document.getElementById(canvasId);
  const ctx = canvas.getContext('2d');
  const cx = size / 2;
  const cy = size / 2;
  const r = size / 2;

  // Background circle
  ctx.beginPath();
  ctx.arc(cx, cy, r, 0, Math.PI * 2);
  ctx.fillStyle = '#0a0a0f';
  ctx.fill();

  // Teal outer ring
  ctx.beginPath();
  ctx.arc(cx, cy, r - size * 0.01, 0, Math.PI * 2);
  ctx.strokeStyle = '#00e5c3';
  ctx.lineWidth = size * 0.025;
  ctx.stroke();

  // Inner dark circle
  ctx.beginPath();
  ctx.arc(cx, cy, r * 0.88, 0, Math.PI * 2);
  ctx.fillStyle = '#0a0a0f';
  ctx.fill();

  // KM text
  const fontSize = size * 0.42;
  ctx.font = `900 ${fontSize}px Georgia, serif`;
  ctx.textBaseline = 'middle';

  // Measure total width to center both letters
  const kWidth = ctx.measureText('K').width;
  const mWidth = ctx.measureText('M').width;
  const gap = size * 0.02;
  const totalWidth = kWidth + mWidth + gap;
  const startX = cx - totalWidth / 2;

  // Draw K in white
  ctx.fillStyle = '#ffffff';
  ctx.fillText('K', startX, cy + size * 0.03);

  // Draw M in teal
  ctx.fillStyle = '#00e5c3';
  ctx.fillText('M', startX + kWidth + gap, cy + size * 0.03);

  // Small teal dot at bottom
  ctx.beginPath();
  ctx.arc(cx, cy + r * 0.72, size * 0.025, 0, Math.PI * 2);
  ctx.fillStyle = '#00e5c3';
  ctx.fill();
}

function download(canvasId, filename) {
  const canvas = document.getElementById(canvasId);
  const link = document.createElement('a');
  link.download = filename;
  link.href = canvas.toDataURL('image/png');
  link.click();
}

drawIcon('c512', 512);
drawIcon('c192', 192);
</script>
</body>
</html>
